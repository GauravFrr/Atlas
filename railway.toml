# Railway — shared repo, multiple services (see docs/RAILWAY.md)
# Start command is the same for every service; pick role with RAILWAY_SERVICE_ROLE:
#   webhook  → Service 1 (default) — Instantly + Razorpay webhooks
#   telegram → Service 2 — Telegram approve bot
#
# Service 1: leave unset or RAILWAY_SERVICE_ROLE=webhook
# Service 2: Variables → RAILWAY_SERVICE_ROLE=telegram
# Healthcheck /health only on Service 1 (set in Railway UI for that service).

[build]
builder = "nixpacks"

[deploy]
startCommand = "python scripts/railway_start.py"
restartPolicyType = "on_failure"
