# Railway deploy — webhooks + health (Razorpay + Instantly)
# https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"

[deploy]
startCommand = "python scripts/run_instantly_webhook.py --host 0.0.0.0"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
